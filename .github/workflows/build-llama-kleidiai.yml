name: Build llama.cpp with KleidiAI

on:
  workflow_dispatch:

jobs:
  build:
    name: Build on native Arm64
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Display environment
        shell: bash
        run: |
          set -euxo pipefail

          echo "===== ARCHITECTURE ====="
          uname -m

          echo "===== CPU MODEL ====="
          lscpu | grep -E "Architecture|Model name|CPU\(s\)"

          echo "===== MEMORY ====="
          free -h

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            pkg-config \
            libcurl4-openssl-dev

          echo "===== TOOL VERSIONS ====="
          gcc --version | head -1
          g++ --version | head -1
          cmake --version | head -1
          ninja --version
          git --version

      - name: Clone llama.cpp
        shell: bash
        run: |
          set -euxo pipefail

          git clone \
            --depth 1 \
            https://github.com/ggml-org/llama.cpp.git

          cd llama.cpp

          echo "===== LLAMA.CPP COMMIT ====="
          git rev-parse HEAD

      - name: Configure with KleidiAI
        shell: bash
        run: |
          set -euxo pipefail

          cmake \
            -S llama.cpp \
            -B llama.cpp/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_CPU_KLEIDIAI=ON \
            -DGGML_NATIVE=ON

          echo "===== KLEIDIAI CONFIGURATION ====="

          grep \
            "^GGML_CPU_KLEIDIAI:" \
            llama.cpp/build/CMakeCache.txt

      - name: Build llama-cli and llama-bench
        shell: bash
        run: |
          set -euxo pipefail

          cmake \
            --build llama.cpp/build \
            --target llama-cli llama-bench \
            --parallel 4

      - name: Verify compiled binaries
        shell: bash
        run: |
          set -euxo pipefail

          test -x llama.cpp/build/bin/llama-cli
          test -x llama.cpp/build/bin/llama-bench

          echo "===== LLAMA CLI VERSION ====="
          llama.cpp/build/bin/llama-cli --version

          echo "===== LLAMA BENCH VERIFICATION ====="
          llama.cpp/build/bin/llama-bench --help > /tmp/llama-bench-help.txt 2>&1
          head -20 /tmp/llama-bench-help.txt

          echo "===== BUILD SUCCESS ====="
          echo "llama.cpp compiled successfully on native Arm64 with KleidiAI enabled."

      - name: Run first Arm64 inference
        shell: bash
        run: |
          set -euxo pipefail

          echo "===== FIRST ARM64 INFERENCE ====="

          timeout 5m llama.cpp/build/bin/llama-cli \
            -hf bartowski/SmolLM2-360M-Instruct-GGUF:Q4_K_M \
            --prompt "Write one short sentence confirming that AI inference is running successfully on an Arm64 CPU." \
            --n-predict 48 \
            --threads 4 \
            --temp 0 \
            --single-turn

          echo ""
          echo "===== INFERENCE SUCCESS ====="

      - name: Benchmark first Arm64 model
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p benchmark-results

          echo "===== BASELINE BENCHMARK ====="

          llama.cpp/build/bin/llama-bench \
            -hf bartowski/SmolLM2-360M-Instruct-GGUF:Q4_K_M \
            --threads 4 \
            --n-prompt 128 \
            --n-gen 64 \
            --repetitions 5 \
            --output json \
            > benchmark-results/smollm2-baseline.json

          cat benchmark-results/smollm2-baseline.json

          echo ""
          echo "===== BASELINE BENCHMARK SUCCESS ====="
      - name: Upload baseline benchmark
        uses: actions/upload-artifact@v4
        with:
          name: smollm2-arm64-baseline
          path: benchmark-results/smollm2-baseline.json
          if-no-files-found: error

      - name: Build llama-bench without KleidiAI
        shell: bash
        run: |
          set -euxo pipefail

          cmake \
            -S llama.cpp \
            -B llama.cpp/build-no-kleidiai \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_CPU_KLEIDIAI=OFF \
            -DGGML_NATIVE=ON

          echo "===== NON-KLEIDIAI CONFIGURATION ====="
          grep \
            "^GGML_CPU_KLEIDIAI:" \
            llama.cpp/build-no-kleidiai/CMakeCache.txt

          cmake \
            --build llama.cpp/build-no-kleidiai \
            --target llama-bench \
            --parallel 4

      - name: Benchmark without KleidiAI
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p benchmark-results

          echo "===== NON-KLEIDIAI BENCHMARK ====="

          llama.cpp/build-no-kleidiai/bin/llama-bench \
            -hf bartowski/SmolLM2-360M-Instruct-GGUF:Q4_K_M \
            --threads 4 \
            --n-prompt 128 \
            --n-gen 64 \
            --repetitions 5 \
            --output json \
            > benchmark-results/smollm2-no-kleidiai.json

          cat benchmark-results/smollm2-no-kleidiai.json

          echo ""
          echo "===== NON-KLEIDIAI BENCHMARK SUCCESS ====="

      - name: Upload non-KleidiAI benchmark
        uses: actions/upload-artifact@v4
        with:
          name: smollm2-arm64-no-kleidiai
          path: benchmark-results/smollm2-no-kleidiai.json
          if-no-files-found: error

      - name: Benchmark thread scaling
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p benchmark-results

          echo "===== KLEIDIAI THREAD SCALING ====="

          llama.cpp/build/bin/llama-bench \
            -hf bartowski/SmolLM2-360M-Instruct-GGUF:Q4_K_M \
            --threads 1,2,4 \
            --n-prompt 128 \
            --n-gen 64 \
            --repetitions 5 \
            --output json \
            > benchmark-results/thread-scaling-kleidiai.json

          cat benchmark-results/thread-scaling-kleidiai.json

          echo ""
          echo "===== NON-KLEIDIAI THREAD SCALING ====="

          llama.cpp/build-no-kleidiai/bin/llama-bench \
            -hf bartowski/SmolLM2-360M-Instruct-GGUF:Q4_K_M \
            --threads 1,2,4 \
            --n-prompt 128 \
            --n-gen 64 \
            --repetitions 5 \
            --output json \
            > benchmark-results/thread-scaling-no-kleidiai.json

          cat benchmark-results/thread-scaling-no-kleidiai.json

          echo ""
          echo "===== THREAD SCALING SUCCESS ====="

      - name: Upload thread scaling results
        uses: actions/upload-artifact@v4
        with:
          name: smollm2-arm64-thread-scaling
          path: |
            benchmark-results/thread-scaling-kleidiai.json
            benchmark-results/thread-scaling-no-kleidiai.json
          if-no-files-found: error

      - name: Run interleaved KleidiAI A-B test
        shell: bash
        run: |
          set -euxo pipefail

          RESULT_DIR="benchmark-results/interleaved"
          MODEL="bartowski/SmolLM2-360M-Instruct-GGUF:Q4_K_M"

          mkdir -p "$RESULT_DIR"

          echo "round,order_position,mode,file" \
            > "$RESULT_DIR/manifest.csv"

          run_benchmark() {
            local round="$1"
            local position="$2"
            local mode="$3"
            local binary="$4"
            local output_file="$RESULT_DIR/round-${round}-${mode}.json"

            echo ""
            echo "===== ROUND ${round} POSITION ${position}: ${mode} ====="

            "$binary" \
              -hf "$MODEL" \
              --threads 4 \
              --n-prompt 128 \
              --n-gen 64 \
              --repetitions 3 \
              --output json \
              > "$output_file"

            echo "${round},${position},${mode},${output_file}" \
              >> "$RESULT_DIR/manifest.csv"
          }

          for round in $(seq 1 8); do
            if (( round % 2 == 1 )); then
              run_benchmark "$round" 1 "kleidiai-on" \
                "llama.cpp/build/bin/llama-bench"

              sleep 2

              run_benchmark "$round" 2 "kleidiai-off" \
                "llama.cpp/build-no-kleidiai/bin/llama-bench"
            else
              run_benchmark "$round" 1 "kleidiai-off" \
                "llama.cpp/build-no-kleidiai/bin/llama-bench"

              sleep 2

              run_benchmark "$round" 2 "kleidiai-on" \
                "llama.cpp/build/bin/llama-bench"
            fi

            sleep 2
          done

          python3 - <<'PY'
          import csv
          import json
          from pathlib import Path

          result_dir = Path("benchmark-results/interleaved")
          rows = []

          with (result_dir / "manifest.csv").open(newline="") as handle:
              manifest = csv.DictReader(handle)

              for item in manifest:
                  with Path(item["file"]).open() as benchmark_file:
                      results = json.load(benchmark_file)

                  prompt = next(
                      result for result in results
                      if result["n_prompt"] > 0
                  )
                  generation = next(
                      result for result in results
                      if result["n_gen"] > 0
                  )

                  rows.append({
                      "round": item["round"],
                      "order_position": item["order_position"],
                      "mode": item["mode"],
                      "prompt_tokens_per_second": prompt["avg_ts"],
                      "prompt_stddev": prompt["stddev_ts"],
                      "generation_tokens_per_second": generation["avg_ts"],
                      "generation_stddev": generation["stddev_ts"],
                  })

          output_path = result_dir / "interleaved-summary.csv"

          with output_path.open("w", newline="") as handle:
              writer = csv.DictWriter(handle, fieldnames=rows[0].keys())
              writer.writeheader()
              writer.writerows(rows)

          print("===== INTERLEAVED A-B SUMMARY =====")
          print(output_path.read_text())
          print("===== INTERLEAVED A-B SUCCESS =====")
          PY


      - name: Upload interleaved A-B results
        uses: actions/upload-artifact@v4
        with:
          name: smollm2-kleidiai-interleaved-ab
          path: benchmark-results/interleaved/
          if-no-files-found: error

      - name: Run 1.7B interleaved KleidiAI A-B test
        shell: bash
        run: |
          set -euxo pipefail

          RESULT_DIR="benchmark-results/smollm2-1.7b-interleaved"
          MODEL="bartowski/SmolLM2-1.7B-Instruct-GGUF:Q4_K_M"

          mkdir -p "$RESULT_DIR"

          echo "round,order_position,mode,file" \
            > "$RESULT_DIR/manifest.csv"

          run_benchmark() {
            local round="$1"
            local position="$2"
            local mode="$3"
            local binary="$4"
            local output_file="$RESULT_DIR/round-${round}-${mode}.json"

            echo ""
            echo "===== 1.7B ROUND ${round} POSITION ${position}: ${mode} ====="

            "$binary" \
              -hf "$MODEL" \
              --threads 4 \
              --n-prompt 128 \
              --n-gen 64 \
              --repetitions 3 \
              --output json \
              > "$output_file"

            echo "${round},${position},${mode},${output_file}" \
              >> "$RESULT_DIR/manifest.csv"
          }

          for round in $(seq 1 8); do
            if (( round % 2 == 1 )); then
              run_benchmark "$round" 1 "kleidiai-on" \
                "llama.cpp/build/bin/llama-bench"

              sleep 2

              run_benchmark "$round" 2 "kleidiai-off" \
                "llama.cpp/build-no-kleidiai/bin/llama-bench"
            else
              run_benchmark "$round" 1 "kleidiai-off" \
                "llama.cpp/build-no-kleidiai/bin/llama-bench"

              sleep 2

              run_benchmark "$round" 2 "kleidiai-on" \
                "llama.cpp/build/bin/llama-bench"
            fi

            sleep 2
          done

          python3 - <<'PY'
          import csv
          import json
          from pathlib import Path

          result_dir = Path(
              "benchmark-results/smollm2-1.7b-interleaved"
          )

          rows = []

          with (result_dir / "manifest.csv").open(newline="") as handle:
              for item in csv.DictReader(handle):
                  with Path(item["file"]).open() as benchmark_file:
                      results = json.load(benchmark_file)

                  prompt = next(
                      result for result in results
                      if result["n_prompt"] > 0
                  )

                  generation = next(
                      result for result in results
                      if result["n_gen"] > 0
                  )

                  rows.append({
                      "round": int(item["round"]),
                      "order_position": int(item["order_position"]),
                      "mode": item["mode"],
                      "prompt_tokens_per_second": prompt["avg_ts"],
                      "prompt_stddev": prompt["stddev_ts"],
                      "generation_tokens_per_second": generation["avg_ts"],
                      "generation_stddev": generation["stddev_ts"],
                  })

          summary_path = result_dir / "interleaved-summary.csv"

          with summary_path.open("w", newline="") as handle:
              writer = csv.DictWriter(
                  handle,
                  fieldnames=rows[0].keys(),
              )
              writer.writeheader()
              writer.writerows(rows)

          print("===== 1.7B INTERLEAVED A-B SUMMARY =====")
          print(summary_path.read_text())
          print("===== 1.7B INTERLEAVED A-B SUCCESS =====")
          PY

      - name: Upload 1.7B interleaved results
        uses: actions/upload-artifact@v4
        with:
          name: smollm2-1.7b-kleidiai-interleaved-ab
          path: benchmark-results/smollm2-1.7b-interleaved/
          if-no-files-found: error
