name: Q4 vs Q8 Quality Output Study

on:
  workflow_dispatch:

jobs:
  collect:
    name: Collect deterministic model outputs
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Verify Arm64 environment
        shell: bash
        run: |
          set -euxo pipefail

          uname -m
          lscpu | grep -E "Architecture|Model name|CPU\(s\)"
          free -h
          df -h /

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            pkg-config \
            libcurl4-openssl-dev

      - name: Build llama-server with KleidiAI
        shell: bash
        run: |
          set -euxo pipefail

          git clone \
            --depth 1 \
            https://github.com/ggml-org/llama.cpp.git

          cmake \
            -S llama.cpp \
            -B llama.cpp/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_CPU_KLEIDIAI=ON \
            -DGGML_NATIVE=ON

          cmake \
            --build llama.cpp/build \
            --target llama-server \
            --parallel 4

          echo "===== BUILD CONFIGURATION ====="

          grep \
            "^GGML_CPU_KLEIDIAI:" \
            llama.cpp/build/CMakeCache.txt

          llama.cpp/build/bin/llama-server --version

      - name: Create fixed evaluation cases
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p quality-results

          cat > quality-results/cases.json <<'JSON'
          [
            {
              "id": "factual_01",
              "category": "factual",
              "prompt": "What is the capital city of Kenya? Respond with the city name only."
            },
            {
              "id": "arithmetic_01",
              "category": "arithmetic",
              "prompt": "A store had 48 notebooks. It sold 19 and then received 7 new notebooks. How many notebooks does it have now? Respond with the number only."
            },
            {
              "id": "logic_01",
              "category": "logic",
              "prompt": "Every Zuri is a Tamu. No Tamu is a Pendo. Can any Zuri be a Pendo? Respond with either YES or NO, followed by one short sentence explaining why."
            },
            {
              "id": "summary_01",
              "category": "summarization",
              "prompt": "Summarize the following passage in exactly one sentence: A community library extended its opening hours from six to ten hours per day. During the following month, student visits increased by 40 percent, while electricity costs increased by 12 percent. The library board decided to retain the longer schedule because the increase in educational access outweighed the additional operating cost."
            },
            {
              "id": "extraction_01",
              "category": "structured extraction",
              "prompt": "Extract the following information as valid JSON with exactly these keys: name, city, role, years_experience. Text: Amina Wekesa is a software engineer based in Nairobi with three years of experience. Return JSON only."
            },
            {
              "id": "instruction_01",
              "category": "instruction following",
              "prompt": "Give exactly three benefits of CPU-based AI inference. Use exactly three bullet points. Each bullet must contain no more than six words."
            },
            {
              "id": "swahili_01",
              "category": "translation",
              "prompt": "Translate this sentence into natural Swahili: The system selects the fastest model that still meets the required quality. Return only the translation."
            },
            {
              "id": "coding_01",
              "category": "coding",
              "prompt": "Write a Python function named clamp that accepts value, minimum, and maximum, and returns value restricted to that range. Return code only, without Markdown fences."
            }
          ]
          JSON

          python3 -m json.tool quality-results/cases.json

      - name: Run Q4 and Q8 quality collection
        shell: bash
        run: |
          set -euxo pipefail

          SERVER_BIN="llama.cpp/build/bin/llama-server"
          REPOSITORY="bartowski/SmolLM2-1.7B-Instruct-GGUF"
          PORT="8080"

          run_quantization() {
            local quantization="$1"
            local result_dir="quality-results/${quantization}"
            local log_file="${result_dir}/server.log"

            mkdir -p "$result_dir"

            echo ""
            echo "===== STARTING ${quantization} SERVER ====="

            "$SERVER_BIN" \
              -hf "${REPOSITORY}:${quantization}" \
              --host 127.0.0.1 \
              --port "$PORT" \
              --threads 4 \
              --ctx-size 4096 \
              > "$log_file" 2>&1 &

            local server_pid=$!

            cleanup_server() {
              if kill -0 "$server_pid" 2>/dev/null; then
                kill "$server_pid" || true
                wait "$server_pid" || true
              fi
            }

            trap cleanup_server RETURN

            echo "Waiting for ${quantization} to load..."

            ready="false"

            for attempt in $(seq 1 120); do
              if curl \
                --silent \
                --fail \
                "http://127.0.0.1:${PORT}/health" \
                > "${result_dir}/health.json"; then
                ready="true"
                break
              fi

              if ! kill -0 "$server_pid" 2>/dev/null; then
                echo "Server exited before becoming ready."
                cat "$log_file"
                exit 1
              fi

              sleep 2
            done

            if [[ "$ready" != "true" ]]; then
              echo "Server did not become ready."
              cat "$log_file"
              exit 1
            fi

            echo "${quantization} server is ready."

            QUANTIZATION="$quantization" PORT="$PORT" python3 - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          quantization = os.environ["QUANTIZATION"]
          port = os.environ["PORT"]

          root = Path("quality-results")
          output_dir = root / quantization
          cases = json.loads((root / "cases.json").read_text())

          records = []

          for case in cases:
              payload = {
                  "model": "local-model",
                  "messages": [
                      {
                          "role": "system",
                          "content": (
                              "Follow the user's requested output format exactly. "
                              "Do not add introductions or unrelated commentary."
                          ),
                      },
                      {
                          "role": "user",
                          "content": case["prompt"],
                      },
                  ],
                  "temperature": 0,
                  "seed": 42,
                  "max_tokens": 192,
                  "stream": False,
              }

              request = urllib.request.Request(
                  f"http://127.0.0.1:{port}/v1/chat/completions",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )

              started = time.perf_counter()

              try:
                  with urllib.request.urlopen(request, timeout=180) as response:
                      raw = json.loads(response.read().decode("utf-8"))
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", errors="replace")
                  raise RuntimeError(
                      f"HTTP {error.code} for {case['id']}: {body}"
                  ) from error

              elapsed_ms = round(
                  (time.perf_counter() - started) * 1000,
                  3,
              )

              content = raw["choices"][0]["message"]["content"]

              record = {
                  "id": case["id"],
                  "category": case["category"],
                  "quantization": quantization,
                  "prompt": case["prompt"],
                  "answer": content.strip(),
                  "elapsed_ms": elapsed_ms,
                  "usage": raw.get("usage", {}),
                  "timings": raw.get("timings", {}),
              }

              records.append(record)

              individual_path = output_dir / f"{case['id']}.json"
              individual_path.write_text(
                  json.dumps(record, indent=2, ensure_ascii=False)
                  + "\n"
              )

              print(
                  f"{quantization} | {case['id']} | "
                  f"{elapsed_ms} ms"
              )

          output_path = output_dir / "responses.json"

          output_path.write_text(
              json.dumps(records, indent=2, ensure_ascii=False)
              + "\n"
          )
          PY

            cleanup_server
            trap - RETURN

            echo "===== ${quantization} COLLECTION SUCCESS ====="
          }

          run_quantization "Q4_K_M"
          run_quantization "Q8_0"

          echo "===== BOTH QUANTIZATIONS COMPLETE ====="

      - name: Generate side-by-side report
        shell: bash
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path("quality-results")

          q4 = {
              row["id"]: row
              for row in json.loads(
                  (root / "Q4_K_M" / "responses.json").read_text()
              )
          }

          q8 = {
              row["id"]: row
              for row in json.loads(
                  (root / "Q8_0" / "responses.json").read_text()
              )
          }

          cases = json.loads((root / "cases.json").read_text())

          def markdown_text(value):
              return (
                  value.replace("|", "\\|")
                  .replace("\r\n", "\n")
                  .replace("\n", "<br>")
              )

          lines = [
              "# SmolLM2-1.7B Q4_K_M vs Q8_0",
              "",
              "Deterministic settings: temperature 0, seed 42.",
              "",
              "| Case | Category | Q4_K_M answer | Q8_0 answer |",
              "|---|---|---|---|",
          ]

          for case in cases:
              case_id = case["id"]

              lines.append(
                  "| "
                  + markdown_text(case_id)
                  + " | "
                  + markdown_text(case["category"])
                  + " | "
                  + markdown_text(q4[case_id]["answer"])
                  + " | "
                  + markdown_text(q8[case_id]["answer"])
                  + " |"
              )

          report = "\n".join(lines) + "\n"

          report_path = root / "side-by-side.md"
          report_path.write_text(report)

          print("===== QUALITY OUTPUT SUMMARY =====")
          print(report)
          print("===== QUALITY OUTPUT COLLECTION SUCCESS =====")
          PY

      - name: Score quality outputs automatically
        shell: bash
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          import ast
          import csv
          import json
          import re
          from pathlib import Path

          ROOT = Path("quality-results")
          QUANTIZATIONS = ("Q4_K_M", "Q8_0")

          def normalize(text):
              return re.sub(r"\s+", " ", text.strip()).casefold()

          def strip_code_fences(text):
              lines = text.strip().splitlines()

              if lines and lines[0].strip().startswith("```"):
                  lines = lines[1:]

              if lines and lines[-1].strip() == "```":
                  lines = lines[:-1]

              return "\n".join(lines).strip()

          def score_factual(answer):
              correct = normalize(answer) == "nairobi"
              return correct, correct, "Expected exactly: Nairobi"

          def score_arithmetic(answer):
              normalized = normalize(answer)

              correct = normalized == "36"
              format_ok = bool(re.fullmatch(r"36", normalized))

              return (
                  correct,
                  format_ok,
                  "Expected number-only answer: 36",
              )

          def score_logic(answer):
              normalized = normalize(answer)

              starts_no = normalized.startswith("no")
              has_explanation = len(normalized.split()) > 4
              mentions_relationship = (
                  "tamu" in normalized
                  and "pendo" in normalized
              )

              correct = (
                  starts_no
                  and mentions_relationship
              )

              format_ok = (
                  starts_no
                  and has_explanation
                  and mentions_relationship
              )

              return (
                  correct,
                  format_ok,
                  "Expected NO followed by a short explanation.",
              )

          def score_summary(answer):
              normalized = normalize(answer)

              required = (
                  "40" in normalized
                  and "12" in normalized
                  and "student" in normalized
                  and (
                      "electricity" in normalized
                      or "operating cost" in normalized
                  )
                  and (
                      "retain" in normalized
                      or "longer schedule" in normalized
                      or "longer hours" in normalized
                  )
              )

              sentence_endings = re.findall(
                  r"[.!?](?:\s|$)",
                  answer.strip(),
              )

              one_sentence = len(sentence_endings) <= 1

              return (
                  required,
                  one_sentence,
                  "Expected one sentence preserving the main facts.",
              )

          def score_extraction(answer):
              try:
                  parsed = json.loads(answer)
              except json.JSONDecodeError:
                  return (
                      False,
                      False,
                      "Response is not valid JSON.",
                  )

              expected = {
                  "name": "Amina Wekesa",
                  "city": "Nairobi",
                  "role": "software engineer",
                  "years_experience": 3,
              }

              correct = parsed == expected

              format_ok = (
                  isinstance(parsed, dict)
                  and list(parsed.keys())
                  == [
                      "name",
                      "city",
                      "role",
                      "years_experience",
                  ]
              )

              return (
                  correct,
                  format_ok,
                  "Expected exact keys and extracted values.",
              )

          def score_instruction(answer):
              bullet_lines = [
                  line.strip()
                  for line in answer.splitlines()
                  if line.strip().startswith(("-", "*"))
              ]

              exactly_three = len(bullet_lines) == 3

              lengths_valid = all(
                  len(
                      re.findall(
                          r"\b[\w'-]+\b",
                          re.sub(r"^[-*]\s*", "", line),
                      )
                  ) <= 6
                  for line in bullet_lines
              )

              nonempty = all(
                  re.sub(r"^[-*]\s*", "", line).strip()
                  for line in bullet_lines
              )

              correct = exactly_three and nonempty
              format_ok = exactly_three and lengths_valid

              return (
                  correct,
                  format_ok,
                  "Expected exactly three bullets of six words or fewer.",
              )

          def score_swahili(answer):
              normalized = normalize(answer)

              original = normalize(
                  "The system selects the fastest model that still "
                  "meets the required quality."
              )

              has_system = "mfumo" in normalized
              has_model = "modeli" in normalized

              has_selection = any(
                  word in normalized
                  for word in (
                      "huchagua",
                      "inachagua",
                      "unachagua",
                      "huteua",
                      "inateua",
                  )
              )

              has_speed = any(
                  word in normalized
                  for word in (
                      "haraka",
                      "kasi",
                      "ya kasi zaidi",
                  )
              )

              has_quality = "ubora" in normalized

              correct = (
                  normalized != original
                  and has_system
                  and has_model
                  and has_selection
                  and has_speed
                  and has_quality
              )

              format_ok = (
                  "\n" not in answer.strip()
                  and not answer.strip().startswith("```")
              )

              return (
                  correct,
                  format_ok,
                  "Expected a Swahili-only translation.",
              )

          def score_coding(answer):
              raw = answer.strip()

              format_ok = (
                  not raw.startswith("```")
                  and not raw.endswith("```")
              )

              code = strip_code_fences(raw)

              try:
                  tree = ast.parse(code)
              except SyntaxError:
                  return (
                      False,
                      format_ok,
                      "Returned code could not be parsed.",
                  )

              unsafe = False

              for node in ast.walk(tree):
                  if isinstance(
                      node,
                      (
                          ast.Import,
                          ast.ImportFrom,
                          ast.Attribute,
                          ast.ClassDef,
                          ast.Lambda,
                          ast.For,
                          ast.While,
                          ast.With,
                          ast.Try,
                          ast.Global,
                          ast.Nonlocal,
                      ),
                  ):
                      unsafe = True

                  if isinstance(node, ast.Call):
                      if not (
                          isinstance(node.func, ast.Name)
                          and node.func.id in {"min", "max"}
                      ):
                          unsafe = True

              functions = [
                  node
                  for node in tree.body
                  if isinstance(node, ast.FunctionDef)
              ]

              if len(functions) != 1 or unsafe:
                  return (
                      False,
                      format_ok,
                      "Expected one safe clamp function.",
                  )

              function = functions[0]

              argument_names = [
                  argument.arg
                  for argument in function.args.args
              ]

              signature_ok = (
                  function.name == "clamp"
                  and argument_names
                  == ["value", "minimum", "maximum"]
              )

              behavior_ok = False

              if signature_ok:
                  environment = {
                      "__builtins__": {
                          "min": min,
                          "max": max,
                      }
                  }

                  try:
                      exec(
                          compile(tree, "<model-output>", "exec"),
                          environment,
                          environment,
                      )

                      clamp = environment["clamp"]

                      tests = (
                          (5, 0, 10, 5),
                          (-2, 0, 10, 0),
                          (15, 0, 10, 10),
                          (3.5, 1.0, 4.0, 3.5),
                      )

                      behavior_ok = all(
                          clamp(value, minimum, maximum)
                          == expected
                          for (
                              value,
                              minimum,
                              maximum,
                              expected,
                          ) in tests
                      )
                  except Exception:
                      behavior_ok = False

              correct = signature_ok and behavior_ok

              return (
                  correct,
                  format_ok,
                  "Expected code-only output and exact parameter names.",
              )

          SCORERS = {
              "factual_01": score_factual,
              "arithmetic_01": score_arithmetic,
              "logic_01": score_logic,
              "summary_01": score_summary,
              "extraction_01": score_extraction,
              "instruction_01": score_instruction,
              "swahili_01": score_swahili,
              "coding_01": score_coding,
          }

          all_results = []
          summaries = []

          for quantization in QUANTIZATIONS:
              response_path = (
                  ROOT
                  / quantization
                  / "responses.json"
              )

              responses = json.loads(
                  response_path.read_text()
              )

              quantization_results = []

              for response in responses:
                  case_id = response["id"]
                  scorer = SCORERS[case_id]

                  correctness, format_ok, note = scorer(
                      response["answer"]
                  )

                  result = {
                      "quantization": quantization,
                      "id": case_id,
                      "category": response["category"],
                      "correctness_pass": correctness,
                      "format_pass": format_ok,
                      "strict_pass": correctness and format_ok,
                      "note": note,
                      "answer": response["answer"],
                  }

                  quantization_results.append(result)
                  all_results.append(result)

              total = len(quantization_results)

              correctness_total = sum(
                  result["correctness_pass"]
                  for result in quantization_results
              )

              format_total = sum(
                  result["format_pass"]
                  for result in quantization_results
              )

              strict_total = sum(
                  result["strict_pass"]
                  for result in quantization_results
              )

              summaries.append({
                  "quantization": quantization,
                  "total_cases": total,
                  "correctness_passes": correctness_total,
                  "format_passes": format_total,
                  "strict_passes": strict_total,
                  "correctness_percent": round(
                      correctness_total / total * 100,
                      2,
                  ),
                  "format_percent": round(
                      format_total / total * 100,
                      2,
                  ),
                  "strict_percent": round(
                      strict_total / total * 100,
                      2,
                  ),
              })

          score_json = ROOT / "quality-scores.json"

          score_json.write_text(
              json.dumps(
                  {
                      "summaries": summaries,
                      "case_results": all_results,
                  },
                  indent=2,
                  ensure_ascii=False,
              )
              + "\n"
          )

          score_csv = ROOT / "quality-score-summary.csv"

          with score_csv.open("w", newline="") as handle:
              writer = csv.DictWriter(
                  handle,
                  fieldnames=summaries[0].keys(),
              )

              writer.writeheader()
              writer.writerows(summaries)

          print("===== AUTOMATIC QUALITY SCORE =====")
          print(score_csv.read_text())

          print("===== CASE RESULTS =====")

          for result in all_results:
              print(
                  f"{result['quantization']} | "
                  f"{result['id']} | "
                  f"correct={result['correctness_pass']} | "
                  f"format={result['format_pass']} | "
                  f"strict={result['strict_pass']}"
              )

          print("===== AUTOMATIC QUALITY SCORING SUCCESS =====")
          PY
      - name: Upload quality outputs
        uses: actions/upload-artifact@v4
        with:
          name: smollm2-q4-vs-q8-quality-outputs
          path: quality-results/
          if-no-files-found: error
