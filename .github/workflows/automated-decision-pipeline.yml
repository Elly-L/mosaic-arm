name: Automated MOSAIC Pipeline

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write

jobs:
  generate-and-select:
    name: Generate candidates and select profiles
    runs-on: ubuntu-24.04-arm

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required files
        shell: bash
        run: |
          set -euxo pipefail

          test -f mosaic/build_candidates.py
          test -f mosaic/decision_engine.py
          test -f mosaic/generate_report.py
          test -f mosaic/api.py
          test -f mosaic/__init__.py
          test -f mosaic/static/index.html
          test -f requirements-api.txt
          test -f Dockerfile
          test -f .dockerignore

          python3 --version
          gh --version

      - name: Find latest successful source runs
        shell: bash
        run: |
          set -euxo pipefail

          QUANTIZATION_RUN_ID="$(
            gh run list \
              --workflow quantization-study.yml \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId'
          )"

          QUALITY_RUN_ID="$(
            gh run list \
              --workflow quality-output-study.yml \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId'
          )"

          if [[ -z "$QUANTIZATION_RUN_ID" ]]; then
            echo "No successful Quantization Study run found."
            exit 1
          fi

          if [[ -z "$QUALITY_RUN_ID" ]]; then
            echo "No successful Quality Output Study run found."
            exit 1
          fi

          echo \
            "QUANTIZATION_RUN_ID=$QUANTIZATION_RUN_ID" \
            >> "$GITHUB_ENV"

          echo \
            "QUALITY_RUN_ID=$QUALITY_RUN_ID" \
            >> "$GITHUB_ENV"

          echo "===== SOURCE WORKFLOW RUNS ====="
          echo \
            "Quantization run: $QUANTIZATION_RUN_ID"
          echo \
            "Quality run: $QUALITY_RUN_ID"

      - name: Download latest measurement artifacts
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p \
            imported/quantization \
            imported/quality

          gh run download \
            "$QUANTIZATION_RUN_ID" \
            --name smollm2-1.7b-quantization-study \
            --dir imported/quantization

          gh run download \
            "$QUALITY_RUN_ID" \
            --name smollm2-q4-vs-q8-quality-outputs \
            --dir imported/quality

          echo "===== DOWNLOADED FILES ====="
          find imported -type f | sort

          find imported/quantization \
            -name quantization-summary.csv \
            -print \
            -quit \
            | grep -q .

          find imported/quality \
            -name quality-score-summary.csv \
            -print \
            -quit \
            | grep -q .

      - name: Generate candidate dataset
        shell: bash
        run: |
          set -euxo pipefail

          python3 mosaic/build_candidates.py \
            --quantization-dir imported/quantization \
            --quality-dir imported/quality \
            --quantization-run-id \
              "$QUANTIZATION_RUN_ID" \
            --quality-run-id \
              "$QUALITY_RUN_ID" \
            --output generated/candidates.json

          echo ""
          echo "===== GENERATED DATASET ====="
          cat generated/candidates.json

      - name: Validate generated measurements
        shell: bash
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          import json
          from pathlib import Path

          dataset = json.loads(
              Path(
                  "generated/candidates.json"
              ).read_text()
          )

          candidates = {
              candidate["quantization"]: candidate
              for candidate in dataset["candidates"]
          }

          expected_quantizations = {
              "Q4_K_M",
              "Q5_K_M",
              "Q8_0",
          }

          if set(candidates) != expected_quantizations:
              raise AssertionError(
                  "Unexpected candidate set: "
                  f"{set(candidates)}"
              )

          if candidates["Q4_K_M"][
              "strict_quality_percent"
          ] != 62.5:
              raise AssertionError(
                  "Unexpected Q4 quality score."
              )

          if candidates["Q8_0"][
              "strict_quality_percent"
          ] != 50.0:
              raise AssertionError(
                  "Unexpected Q8 quality score."
              )

          if candidates["Q5_K_M"][
              "strict_quality_percent"
          ] is not None:
              raise AssertionError(
                  "Q5 should have no quality evidence yet."
              )

          for candidate in candidates.values():
              if candidate["model_size_mib"] <= 0:
                  raise AssertionError(
                      "Invalid model size."
                  )

              if (
                  candidate[
                      "prompt_tokens_per_second"
                  ]
                  <= 0
              ):
                  raise AssertionError(
                      "Invalid prompt throughput."
                  )

              if (
                  candidate[
                      "generation_tokens_per_second"
                  ]
                  <= 0
              ):
                  raise AssertionError(
                      "Invalid generation throughput."
                  )

          print(
              "Generated measurements validated."
          )
          PY

      - name: Run decision engine on generated data
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p generated/decisions

          for objective in latency memory balanced; do
            python3 mosaic/decision_engine.py \
              --data generated/candidates.json \
              --objective "$objective" \
              --quality-floor 50 \
              --output \
                "generated/decisions/${objective}-quality-50.json"
          done

          python3 mosaic/decision_engine.py \
            --data generated/candidates.json \
            --objective latency \
            --quality-floor 60 \
            --output \
              generated/decisions/latency-quality-60.json

      - name: Validate automated selections
        shell: bash
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          import json
          from pathlib import Path

          directory = Path(
              "generated/decisions"
          )

          expected = {
              "latency-quality-50.json":
                  "smollm2-1.7b-q8-0",
              "memory-quality-50.json":
                  "smollm2-1.7b-q4-k-m",
              "balanced-quality-50.json":
                  "smollm2-1.7b-q8-0",
              "latency-quality-60.json":
                  "smollm2-1.7b-q4-k-m",
          }

          print(
              "===== AUTOMATED MOSAIC SUMMARY ====="
          )

          for filename, expected_id in expected.items():
              result = json.loads(
                  (directory / filename).read_text()
              )

              selected = result[
                  "selected_configuration"
              ]

              if selected is None:
                  raise AssertionError(
                      f"{filename}: no selection"
                  )

              actual_id = selected["id"]

              if actual_id != expected_id:
                  raise AssertionError(
                      f"{filename}: expected "
                      f"{expected_id}, received "
                      f"{actual_id}"
                  )

              print(
                  f"{filename}: "
                  f"{actual_id} "
                  f"({selected['quantization']})"
              )

          print(
              "===== AUTOMATED PIPELINE SUCCESS ====="
          )
          PY

      - name: Generate Optimization Proof Report
        shell: bash
        run: |
          set -euxo pipefail

          python3 mosaic/generate_report.py \
            --candidates generated/candidates.json \
            --decisions-dir generated/decisions \
            --markdown \
              generated/report/optimization-proof-report.md \
            --html \
              generated/report/optimization-proof-report.html \
            --summary-json \
              generated/report/optimization-proof-summary.json
     
      - name: Validate Optimization Proof Report
        shell: bash
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          import json
          from pathlib import Path

          report_dir = Path("generated/report")

          markdown_path = (
              report_dir
              / "optimization-proof-report.md"
          )

          html_path = (
              report_dir
              / "optimization-proof-report.html"
          )

          summary_path = (
              report_dir
              / "optimization-proof-summary.json"
          )

          for path in (
              markdown_path,
              html_path,
              summary_path,
          ):
              if not path.exists():
                  raise AssertionError(
                      f"Missing report artifact: {path}"
                  )

              if path.stat().st_size < 500:
                  raise AssertionError(
                      f"Report artifact is unexpectedly small: {path}"
                  )

          markdown = markdown_path.read_text(
              encoding="utf-8"
          )

          html = html_path.read_text(
              encoding="utf-8"
          )

          summary = json.loads(
              summary_path.read_text(
                  encoding="utf-8"
              )
          )

          required_markdown_sections = (
              "# MOSAIC-Arm Optimization Proof Report",
              "## Test environment",
              "## Candidate evidence",
              "## Automated decisions",
              "## Quality-floor behavior",
              "## Reproducibility evidence",
              "## Interpretation limits",
          )

          for section in required_markdown_sections:
              if section not in markdown:
                  raise AssertionError(
                      f"Missing Markdown section: {section}"
                  )

          required_html_fragments = (
              "<!doctype html>",
              "MOSAIC-Arm Optimization Proof Report",
              "Candidate evidence",
              "Automated decisions",
              "Reproducibility evidence",
          )

          for fragment in required_html_fragments:
              if fragment not in html:
                  raise AssertionError(
                      f"Missing HTML content: {fragment}"
                  )

          expected = {
              ("latency", 50.0):
                  "smollm2-1.7b-q8-0",
              ("memory", 50.0):
                  "smollm2-1.7b-q4-k-m",
              ("balanced", 50.0):
                  "smollm2-1.7b-q8-0",
              ("latency", 60.0):
                  "smollm2-1.7b-q4-k-m",
          }

          actual = {
              (
                  decision["objective"],
                  float(
                      decision[
                          "quality_floor_percent"
                      ]
                  ),
              ): decision["selected_id"]
              for decision in summary["decisions"]
          }

          if actual != expected:
              raise AssertionError(
                  f"Unexpected report decisions: {actual}"
              )

          comparison = summary["q8_vs_q4"]

          if (
              comparison[
                  "prompt_throughput_change_percent"
              ]
              <= 0
          ):
              raise AssertionError(
                  "Expected Q8 prompt throughput "
                  "to exceed Q4."
              )

          if (
              comparison[
                  "generation_throughput_change_percent"
              ]
              <= 0
          ):
              raise AssertionError(
                  "Expected Q8 generation throughput "
                  "to exceed Q4."
              )

          if (
              comparison[
                  "quality_change_percentage_points"
              ]
              >= 0
          ):
              raise AssertionError(
                  "Expected Q8 strict quality "
                  "to be below Q4."
              )

          print(
              "===== OPTIMIZATION PROOF SUMMARY ====="
          )

          print(
              "Markdown:",
              markdown_path,
              markdown_path.stat().st_size,
              "bytes",
          )

          print(
              "HTML:",
              html_path,
              html_path.stat().st_size,
              "bytes",
          )

          print(
              "Summary JSON:",
              summary_path,
              summary_path.stat().st_size,
              "bytes",
          )

          print(
              "Q8 vs Q4 size:",
              f"{comparison['model_size_change_percent']:+.2f}%",
          )

          print(
              "Q8 vs Q4 prompt throughput:",
              f"{comparison['prompt_throughput_change_percent']:+.2f}%",
          )

          print(
              "Q8 vs Q4 generation throughput:",
              f"{comparison['generation_throughput_change_percent']:+.2f}%",
          )

          print(
              "Q8 vs Q4 strict quality:",
              f"{comparison['quality_change_percentage_points']:+.2f}",
              "percentage points",
          )

          for decision in summary["decisions"]:
              print(
                  f"{decision['objective']} | "
                  f"quality >= "
                  f"{decision['quality_floor_percent']}% | "
                  f"{decision['selected_id']}"
              )

          print(
              "===== OPTIMIZATION PROOF REPORT SUCCESS ====="
          )
          PY


      - name: Install MOSAIC API dependencies
        shell: bash
        run: |
          set -euxo pipefail

          python3 -m pip install \
            --disable-pip-version-check \
            -r requirements-api.txt

          python3 -c \
            "import fastapi, uvicorn; print('FastAPI:', fastapi.__version__); print('Uvicorn:', uvicorn.__version__)"

      - name: Test MOSAIC API
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p generated/api-tests

          export MOSAIC_CANDIDATES_PATH="$PWD/generated/candidates.json"
          export MOSAIC_REPORT_HTML_PATH="$PWD/generated/report/optimization-proof-report.html"

          python3 -m uvicorn mosaic.api:app \
            --host 127.0.0.1 \
            --port 8000 \
            > generated/api-tests/server.log \
            2>&1 &

          API_PID=$!

          cleanup() {
            kill "$API_PID" 2>/dev/null || true
            wait "$API_PID" 2>/dev/null || true
          }

          trap cleanup EXIT

          API_READY=false

          for attempt in $(seq 1 30); do
            if curl \
              --fail \
              --silent \
              --show-error \
              http://127.0.0.1:8000/health \
              > generated/api-tests/health.json
            then
              API_READY=true
              break
            fi

            sleep 1
          done

          if [[ "$API_READY" != "true" ]]; then
            echo "MOSAIC API failed to become ready."
            cat generated/api-tests/server.log
            exit 1
          fi

          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:8000/ \
            > generated/api-tests/dashboard.html
          
          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:8000/api/candidates \
            > generated/api-tests/candidates.json

          curl \
            --fail \
            --silent \
            --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --data '{
              "objective": "latency",
              "quality_floor_percent": 50
            }' \
            http://127.0.0.1:8000/api/recommend \
            > generated/api-tests/latency-quality-50.json

          curl \
            --fail \
            --silent \
            --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --data '{
              "objective": "latency",
              "quality_floor_percent": 60
            }' \
            http://127.0.0.1:8000/api/recommend \
            > generated/api-tests/latency-quality-60.json

          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:8000/api/report \
            > generated/api-tests/report.html

          INVALID_STATUS="$(
            curl \
              --silent \
              --output generated/api-tests/invalid-request.json \
              --write-out "%{http_code}" \
              --request POST \
              --header "Content-Type: application/json" \
              --data '{
                "objective": "speed-at-all-costs",
                "quality_floor_percent": 50
              }' \
              http://127.0.0.1:8000/api/recommend
          )"

          echo "$INVALID_STATUS" \
            > generated/api-tests/invalid-status.txt

          if [[ "$INVALID_STATUS" != "422" ]]; then
            echo "Expected invalid request to return 422, received $INVALID_STATUS"
            exit 1
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path

          directory = Path("generated/api-tests")

          def load(name):
              return json.loads(
                  (directory / name).read_text(
                      encoding="utf-8"
                  )
              )

          health = load("health.json")
          candidates = load("candidates.json")
          quality_50 = load("latency-quality-50.json")
          quality_60 = load("latency-quality-60.json")
          invalid = load("invalid-request.json")

          if health["status"] != "ok":
              raise AssertionError(
                  f"API health is not OK: {health}"
              )

          if health["candidate_count"] != 3:
              raise AssertionError(
                  "Expected three API candidates."
              )

          if not health["report_available"]:
              raise AssertionError(
                  "Expected proof report to be available."
              )

          if candidates["candidate_count"] != 3:
              raise AssertionError(
                  "Candidate endpoint returned an unexpected count."
              )

          quantizations = {
              candidate["quantization"]
              for candidate in candidates["candidates"]
          }

          if quantizations != {
              "Q4_K_M",
              "Q5_K_M",
              "Q8_0",
          }:
              raise AssertionError(
                  f"Unexpected quantizations: {quantizations}"
              )

          selected_50 = quality_50[
              "selected_configuration"
          ]

          if (
              selected_50 is None
              or selected_50["id"]
              != "smollm2-1.7b-q8-0"
          ):
              raise AssertionError(
                  "The 50% latency request should select Q8_0."
              )

          selected_60 = quality_60[
              "selected_configuration"
          ]

          if (
              selected_60 is None
              or selected_60["id"]
              != "smollm2-1.7b-q4-k-m"
          ):
              raise AssertionError(
                  "The 60% latency request should select Q4_K_M."
              )

          if not any(
              rejected["id"]
              == "smollm2-1.7b-q8-0"
              and rejected["reason"]
              == "below_quality_floor"
              for rejected in quality_60[
                  "rejected_candidates"
              ]
          ):
              raise AssertionError(
                  "Q8_0 should be rejected at the 60% quality floor."
              )

          dashboard_path = (
              directory / "dashboard.html"
          )

          dashboard = dashboard_path.read_text(
              encoding="utf-8"
          )

          if dashboard_path.stat().st_size < 5000:
              raise AssertionError(
                  "Dashboard HTML is unexpectedly small."
              )

          required_dashboard_fragments = (
              "MOSAIC-Arm Optimizer",
              "Optimization request",
              "Measured candidates",
              "/api/recommend",
              "/api/candidates",
              "Find optimal configuration",
          )

          for fragment in required_dashboard_fragments:
              if fragment not in dashboard:
                  raise AssertionError(
                      "Dashboard is missing required "
                      f"content: {fragment}"
                  )

          report_path = directory / "report.html"
          report = report_path.read_text(
              encoding="utf-8"
          )

          if report_path.stat().st_size < 500:
              raise AssertionError(
                  "Downloaded report is too small."
              )

          if (
              "MOSAIC-Arm Optimization Proof Report"
              not in report
          ):
              raise AssertionError(
                  "Downloaded report content is invalid."
              )

          invalid_status = (
              directory
              / "invalid-status.txt"
          ).read_text().strip()

          if invalid_status != "422":
              raise AssertionError(
                  "Invalid objective did not return 422."
              )

          if "detail" not in invalid:
              raise AssertionError(
                  "Validation error response is malformed."
              )

          print("===== MOSAIC API SUMMARY =====")
          print("Health:", health["status"])
          print(
              "Candidates:",
              candidates["candidate_count"],
          )
          print(
              "Latency, quality >= 50%:",
              selected_50["id"],
          )
          print(
              "Latency, quality >= 60%:",
              selected_60["id"],
          )
          print(
              "Invalid objective status:",
              invalid_status,
          )
          print(
              "Dashboard bytes:",
              dashboard_path.stat().st_size,
          )
          print(
              "Report bytes:",
              report_path.stat().st_size,
          )
          print("===== MOSAIC API SUCCESS =====")
          PY

          echo ""
          echo "===== API SERVER LOG ====="
          cat generated/api-tests/server.log
      
      - name: Build native Arm64 Docker image
        shell: bash
        run: |
          set -euxo pipefail

          docker version

          docker build \
            --pull \
            --tag mosaic-arm:ci \
            .

          IMAGE_ARCHITECTURE="$(
            docker image inspect \
              mosaic-arm:ci \
              --format '{{.Architecture}}'
          )"

          IMAGE_OPERATING_SYSTEM="$(
            docker image inspect \
              mosaic-arm:ci \
              --format '{{.Os}}'
          )"

          IMAGE_SIZE_BYTES="$(
            docker image inspect \
              mosaic-arm:ci \
              --format '{{.Size}}'
          )"

          if [[ "$IMAGE_ARCHITECTURE" != "arm64" ]]; then
            echo \
              "Expected arm64 image, received: $IMAGE_ARCHITECTURE"
            exit 1
          fi

          if [[ "$IMAGE_OPERATING_SYSTEM" != "linux" ]]; then
            echo \
              "Expected Linux image, received: $IMAGE_OPERATING_SYSTEM"
            exit 1
          fi

          echo "===== MOSAIC DOCKER IMAGE ====="
          echo "Architecture: $IMAGE_ARCHITECTURE"
          echo "Operating system: $IMAGE_OPERATING_SYSTEM"
          echo "Size bytes: $IMAGE_SIZE_BYTES" 
      
      - name: Test containerized MOSAIC
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p generated/docker-tests

          docker run \
            --detach \
            --name mosaic-arm-ci \
            --publish 127.0.0.1:8001:8000 \
            mosaic-arm:ci

          cleanup() {
            docker logs \
              mosaic-arm-ci \
              > generated/docker-tests/container.log \
              2>&1 \
              || true

            docker rm \
              --force \
              mosaic-arm-ci \
              || true
          }

          trap cleanup EXIT

          CONTAINER_READY=false

          for attempt in $(seq 1 40); do
            HEALTH_STATUS="$(
              docker inspect \
                mosaic-arm-ci \
                --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}'
            )"

            echo \
              "Container health attempt $attempt: $HEALTH_STATUS"

            if curl \
              --fail \
              --silent \
              --show-error \
              http://127.0.0.1:8001/health \
              > generated/docker-tests/health.json
            then
              CONTAINER_READY=true
              break
            fi

            if [[ "$HEALTH_STATUS" == "unhealthy" ]]; then
              echo "Container became unhealthy."
              docker logs mosaic-arm-ci
              exit 1
            fi

            sleep 1
          done

          if [[ "$CONTAINER_READY" != "true" ]]; then
            echo "Container did not become ready."
            docker inspect mosaic-arm-ci
            docker logs mosaic-arm-ci
            exit 1
          fi

          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:8001/ \
            > generated/docker-tests/dashboard.html

          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:8001/api/candidates \
            > generated/docker-tests/candidates.json

          curl \
            --fail \
            --silent \
            --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --data '{
              "objective": "latency",
              "quality_floor_percent": 50
            }' \
            http://127.0.0.1:8001/api/recommend \
            > generated/docker-tests/latency-quality-50.json

          curl \
            --fail \
            --silent \
            --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --data '{
              "objective": "latency",
              "quality_floor_percent": 60
            }' \
            http://127.0.0.1:8001/api/recommend \
            > generated/docker-tests/latency-quality-60.json

          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:8001/api/report \
            > generated/docker-tests/report.html

          python3 - <<'PY'
          import json
          from pathlib import Path

          directory = Path(
              "generated/docker-tests"
          )

          def load_json(filename):
              return json.loads(
                  (directory / filename).read_text(
                      encoding="utf-8"
                  )
              )

          health = load_json("health.json")
          candidates = load_json(
              "candidates.json"
          )
          quality_50 = load_json(
              "latency-quality-50.json"
          )
          quality_60 = load_json(
              "latency-quality-60.json"
          )

          if health["status"] != "ok":
              raise AssertionError(
                  f"Container health failed: {health}"
              )

          if health["candidate_count"] != 3:
              raise AssertionError(
                  "Expected three candidates "
                  "inside the container."
              )

          if not health["report_available"]:
              raise AssertionError(
                  "Proof report is unavailable "
                  "inside the container."
              )

          if candidates["candidate_count"] != 3:
              raise AssertionError(
                  "Container candidate endpoint "
                  "returned an unexpected count."
              )

          selected_50 = quality_50[
              "selected_configuration"
          ]

          selected_60 = quality_60[
              "selected_configuration"
          ]

          if (
              selected_50 is None
              or selected_50["id"]
              != "smollm2-1.7b-q8-0"
          ):
              raise AssertionError(
                  "Container should select Q8_0 "
                  "at the 50% quality floor."
              )

