name: Quantization Study

on:
  workflow_dispatch:

jobs:
  benchmark:
    name: Compare 1.7B quantizations on Arm64
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Verify Arm64 environment
        shell: bash
        run: |
          set -euxo pipefail

          uname -m
          lscpu | grep -E "Architecture|Model name|CPU\(s\)"
          free -h

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            pkg-config \
            libcurl4-openssl-dev

      - name: Build llama-bench with KleidiAI
        shell: bash
        run: |
          set -euxo pipefail

          git clone \
            --depth 1 \
            https://github.com/ggml-org/llama.cpp.git

          cmake \
            -S llama.cpp \
            -B llama.cpp/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_CPU_KLEIDIAI=ON \
            -DGGML_NATIVE=ON

          cmake \
            --build llama.cpp/build \
            --target llama-bench \
            --parallel 4

          grep \
            "^GGML_CPU_KLEIDIAI:" \
            llama.cpp/build/CMakeCache.txt

      - name: Run quantization comparison
        shell: bash
        run: |
          set -euxo pipefail

          RESULT_DIR="benchmark-results/quantization"
          REPOSITORY="bartowski/SmolLM2-1.7B-Instruct-GGUF"

          mkdir -p "$RESULT_DIR"

          echo "round,position,quantization,file" \
            > "$RESULT_DIR/manifest.csv"

          run_test() {
            local round="$1"
            local position="$2"
            local quantization="$3"
            local output_file="$RESULT_DIR/round-${round}-${position}-${quantization}.json"

            echo ""
            echo "===== ROUND ${round} POSITION ${position}: ${quantization} ====="

            llama.cpp/build/bin/llama-bench \
              -hf "${REPOSITORY}:${quantization}" \
              --threads 4 \
              --n-prompt 128 \
              --n-gen 64 \
              --repetitions 3 \
              --output json \
              > "$output_file"

            echo "${round},${position},${quantization},${output_file}" \
              >> "$RESULT_DIR/manifest.csv"

            sleep 2
          }

          # All six possible execution orders.
          run_test 1 1 Q4_K_M
          run_test 1 2 Q5_K_M
          run_test 1 3 Q8_0

          run_test 2 1 Q4_K_M
          run_test 2 2 Q8_0
          run_test 2 3 Q5_K_M

          run_test 3 1 Q5_K_M
          run_test 3 2 Q4_K_M
          run_test 3 3 Q8_0

          run_test 4 1 Q5_K_M
          run_test 4 2 Q8_0
          run_test 4 3 Q4_K_M

          run_test 5 1 Q8_0
          run_test 5 2 Q4_K_M
          run_test 5 3 Q5_K_M

          run_test 6 1 Q8_0
          run_test 6 2 Q5_K_M
          run_test 6 3 Q4_K_M

      - name: Summarize quantization results
        shell: bash
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          import csv
          import json
          import statistics
          from collections import defaultdict
          from pathlib import Path

          result_dir = Path("benchmark-results/quantization")
          measurements = defaultdict(list)

          with (result_dir / "manifest.csv").open(newline="") as handle:
              for item in csv.DictReader(handle):
                  with Path(item["file"]).open() as benchmark_file:
                      results = json.load(benchmark_file)

                  prompt = next(
                      result for result in results
                      if result["n_prompt"] > 0
                  )

                  generation = next(
                      result for result in results
                      if result["n_gen"] > 0
                  )

                  measurements[item["quantization"]].append({
                      "model_size_bytes": prompt["model_size"],
                      "prompt_tps": prompt["avg_ts"],
                      "generation_tps": generation["avg_ts"],
                  })

          rows = []

          for quantization in ("Q4_K_M", "Q5_K_M", "Q8_0"):
              values = measurements[quantization]

              rows.append({
                  "quantization": quantization,
                  "model_size_mib": round(
                      values[0]["model_size_bytes"] / 1024 / 1024,
                      2,
                  ),
                  "mean_prompt_tps": round(
                      statistics.mean(v["prompt_tps"] for v in values),
                      4,
                  ),
                  "median_prompt_tps": round(
                      statistics.median(v["prompt_tps"] for v in values),
                      4,
                  ),
                  "mean_generation_tps": round(
                      statistics.mean(v["generation_tps"] for v in values),
                      4,
                  ),
                  "median_generation_tps": round(
                      statistics.median(v["generation_tps"] for v in values),
                      4,
                  ),
              })

          summary_path = result_dir / "quantization-summary.csv"

          with summary_path.open("w", newline="") as handle:
              writer = csv.DictWriter(
                  handle,
                  fieldnames=rows[0].keys(),
              )
              writer.writeheader()
              writer.writerows(rows)

          print("===== QUANTIZATION SUMMARY =====")
          print(summary_path.read_text())
          print("===== QUANTIZATION STUDY SUCCESS =====")
          PY

      - name: Upload quantization results
        uses: actions/upload-artifact@v4
        with:
          name: smollm2-1.7b-quantization-study
          path: benchmark-results/quantization/
          if-no-files-found: error
